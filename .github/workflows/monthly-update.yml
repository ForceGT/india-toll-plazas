name: Monthly Data Update

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Wait for Tailscale connection
        run: |
          echo "Waiting for Tailscale to establish connection..."
          max_attempts=60
          attempt=0
          
          while [ $attempt -lt $max_attempts ]; do
            if sudo tailscale status 2>/dev/null | grep -q "100\."; then
              echo "✓ Tailscale connected!"
              break
            fi
            attempt=$((attempt + 1))
            echo "Attempt $attempt/$max_attempts..."
            sleep 2
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "✗ Tailscale failed to connect after 2 minutes"
            echo "Please ensure Tailscale is running on your phone and set as exit node"
            exit 1
          fi

      - name: Configure exit node
        run: |
          echo "Looking for phone exit node..."
          PHONE_IP=$(sudo tailscale status 2>/dev/null | grep -i "android\|phone" | awk '{print $1}' | head -1)
          
          if [ -z "$PHONE_IP" ]; then
            echo "Warning: Could not find phone, trying default IP..."
            PHONE_IP="100.71.85.41"
          fi
          
          echo "Setting exit node to: $PHONE_IP"
          sudo tailscale set --exit-node=$PHONE_IP --exit-node-allow-lan-access=true 2>&1
          
          echo "Waiting 5 seconds for exit node to establish..."
          sleep 5
          
          echo "Final Tailscale status:"
          sudo tailscale status 2>/dev/null || echo "Could not get status"

      - name: Verify connectivity
        run: |
          echo "Testing connectivity to NHAI API..."
          if timeout 10 curl -s -I https://rajmargyatra.nhai.gov.in/nhai/api/getTollplazaName 2>&1 | head -n 1; then
            echo "✓ API is reachable"
          else
            echo "✗ API not reachable - may indicate Tailscale exit node is not working"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run fetch and process script
        run: |
          set -x
          bash ./fetch-and-process.sh
        timeout-minutes: 120

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit changes
        run: |
          git add data/
          git commit -m "chore: update toll plaza data for ${{ steps.date.outputs.date }}" || echo "No changes to commit"

      - name: Push changes
        run: git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest data
        id: data-info
        run: |
          if [ -f data/latest.json ]; then
            TOTAL_PLAZAS=$(jq 'length' data/latest.json)
            NHAI_COUNT=$(jq '[.[] | select(.data_source == "nhai")] | length' data/latest.json)
            STATE_COUNT=$(jq '[.[] | select(.data_source == "state")] | length' data/latest.json)
            echo "TOTAL_PLAZAS=$TOTAL_PLAZAS" >> $GITHUB_OUTPUT
            echo "NHAI_COUNT=$NHAI_COUNT" >> $GITHUB_OUTPUT
            echo "STATE_COUNT=$STATE_COUNT" >> $GITHUB_OUTPUT
          else
            echo "TOTAL_PLAZAS=0" >> $GITHUB_OUTPUT
            echo "NHAI_COUNT=0" >> $GITHUB_OUTPUT
            echo "STATE_COUNT=0" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: Toll Plazas Data - ${{ steps.date.outputs.date }}
          body: |
            India Toll Plazas Dataset Update

            **Data Summary:**
            - Total Toll Plazas: ${{ steps.data-info.outputs.TOTAL_PLAZAS }}
            - NHAI Toll Plazas: ${{ steps.data-info.outputs.NHAI_COUNT }}
            - State Highway Toll Plazas: ${{ steps.data-info.outputs.STATE_COUNT }}

            **Download:**
            - [Latest JSON](https://raw.githubusercontent.com/${{ github.repository }}/main/data/latest.json)
            - [Versioned Data](https://github.com/${{ github.repository }}/tree/main/data/${{ steps.date.outputs.date }})

            **Update Date:** ${{ steps.date.outputs.date }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "Workflow failed! Please check:"
          echo "1. Is your phone powered on and connected to WiFi?"
          echo "2. Is Tailscale running on your phone?"
          echo "3. Is the phone set as exit node?"
          echo "4. Check the full logs at: https://github.com/${{ github.repository }}/actions"
