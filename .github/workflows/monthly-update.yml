name: Monthly Data Update

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          version: 1.68.1

      - name: Wait and verify Tailscale connection
        run: |
          echo "Waiting for Tailscale to connect..."
          for i in {1..30}; do
            if sudo tailscale status 2>&1 | grep -q "100\."; then
              echo "✓ Tailscale connected!"
              echo ""
              echo "Tailscale status:"
              sudo tailscale status
              break
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done

      - name: Discover and set exit node
        run: |
          echo "Discovering exit node..."
          PHONE_IP=$(sudo tailscale status 2>&1 | grep -i "android" | awk '{print $1}' | head -1)
          
          if [ -z "$PHONE_IP" ]; then
            echo "Warning: Could not auto-discover phone IP, trying fallback..."
            PHONE_IP="100.71.85.41"
          fi
          
          echo "Phone IP: $PHONE_IP"
          echo "Setting as exit node..."
          sudo tailscale set --exit-node=$PHONE_IP --exit-node-allow-lan-access=true 2>&1 || true
          
          echo "Waiting 3 seconds for exit node to establish..."
          sleep 3
          
          echo "Final Tailscale status:"
          sudo tailscale status

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run fetch and process script
        run: |
          set -x
          bash ./fetch-and-process.sh
        timeout-minutes: 120

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit changes
        run: |
          git add data/
          git commit -m "chore: update toll plaza data for ${{ steps.date.outputs.date }}" || echo "No changes to commit"

      - name: Push changes
        run: git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest data
        id: data-info
        run: |
          if [ -f data/latest.json ]; then
            TOTAL_PLAZAS=$(jq 'length' data/latest.json)
            NHAI_COUNT=$(jq '[.[] | select(.data_source == "nhai")] | length' data/latest.json)
            STATE_COUNT=$(jq '[.[] | select(.data_source == "state")] | length' data/latest.json)
            echo "TOTAL_PLAZAS=$TOTAL_PLAZAS" >> $GITHUB_OUTPUT
            echo "NHAI_COUNT=$NHAI_COUNT" >> $GITHUB_OUTPUT
            echo "STATE_COUNT=$STATE_COUNT" >> $GITHUB_OUTPUT
          else
            echo "TOTAL_PLAZAS=0" >> $GITHUB_OUTPUT
            echo "NHAI_COUNT=0" >> $GITHUB_OUTPUT
            echo "STATE_COUNT=0" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: Toll Plazas Data - ${{ steps.date.outputs.date }}
          body: |
            India Toll Plazas Dataset Update

            **Data Summary:**
            - Total Toll Plazas: ${{ steps.data-info.outputs.TOTAL_PLAZAS }}
            - NHAI Toll Plazas: ${{ steps.data-info.outputs.NHAI_COUNT }}
            - State Highway Toll Plazas: ${{ steps.data-info.outputs.STATE_COUNT }}

            **Download:**
            - [Latest JSON](https://raw.githubusercontent.com/${{ github.repository }}/main/data/latest.json)
            - [Versioned Data](https://github.com/${{ github.repository }}/tree/main/data/${{ steps.date.outputs.date }})

            **Update Date:** ${{ steps.date.outputs.date }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
