name: Monthly Data Update

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --accept-dns=false --accept-routes=true 2>&1 || true
          sleep 10
          sudo tailscale status

      - name: Wait for Tailscale connection
        run: |
          echo "Waiting for Tailscale to establish connection..."
          for i in {1..30}; do
            if sudo tailscale status 2>/dev/null | grep -q "100\."; then
              echo "✓ Tailscale connected!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done

      - name: Configure exit node
        run: |
          echo "Looking for phone exit node..."
          PHONE_IP=$(sudo tailscale status 2>/dev/null | grep -i "android" | awk '{print $1}' | head -1)
          
          if [ -z "$PHONE_IP" ]; then
            echo "❌ Could not find Android phone in Tailscale network"
            echo "Make sure:"
            echo "  1. Phone has Tailscale installed and running"
            echo "  2. Phone is connected to the Tailscale network"
            exit 1
          fi
          
          echo "Found phone: $PHONE_IP"
          echo "Setting as exit node..."
          
          RESULT=$(sudo tailscale set --exit-node=$PHONE_IP --exit-node-allow-lan-access=true 2>&1)
          
          if echo "$RESULT" | grep -q "not advertising an exit node"; then
            echo "❌ ERROR: Phone is not advertising an exit node!"
            echo "Please enable 'Use as exit node' in Tailscale app on your phone"
            echo "Settings → Route settings → Check 'Use as exit node'"
            exit 1
          fi
          
          echo "✓ Exit node configured"
          echo "Waiting 5 seconds for exit node to establish..."
          sleep 5
          
          echo "Tailscale status:"
          sudo tailscale status

      - name: Verify connectivity
        run: |
          echo "Testing connectivity to NHAI API..."
          if timeout 10 curl -s -I https://rajmargyatra.nhai.gov.in/nhai/api/getTollplazaName 2>&1 | head -n 1; then
            echo "✓ API is reachable"
          else
            echo "✗ API not reachable"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run fetch and process script
        run: |
          set -x
          bash ./fetch-and-process.sh
        timeout-minutes: 120

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit changes
        run: |
          git add data/
          git commit -m "chore: update toll plaza data for ${{ steps.date.outputs.date }}" || echo "No changes to commit"

      - name: Push changes
        run: git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest data
        id: data-info
        run: |
          if [ -f data/latest.json ]; then
            TOTAL_PLAZAS=$(jq 'length' data/latest.json)
            NHAI_COUNT=$(jq '[.[] | select(.data_source == "nhai")] | length' data/latest.json)
            STATE_COUNT=$(jq '[.[] | select(.data_source == "state")] | length' data/latest.json)
            echo "TOTAL_PLAZAS=$TOTAL_PLAZAS" >> $GITHUB_OUTPUT
            echo "NHAI_COUNT=$NHAI_COUNT" >> $GITHUB_OUTPUT
            echo "STATE_COUNT=$STATE_COUNT" >> $GITHUB_OUTPUT
          else
            echo "TOTAL_PLAZAS=0" >> $GITHUB_OUTPUT
            echo "NHAI_COUNT=0" >> $GITHUB_OUTPUT
            echo "STATE_COUNT=0" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: Toll Plazas Data - ${{ steps.date.outputs.date }}
          body: |
            India Toll Plazas Dataset Update

            **Data Summary:**
            - Total Toll Plazas: ${{ steps.data-info.outputs.TOTAL_PLAZAS }}
            - NHAI Toll Plazas: ${{ steps.data-info.outputs.NHAI_COUNT }}
            - State Highway Toll Plazas: ${{ steps.data-info.outputs.STATE_COUNT }}

            **Download:**
            - [Latest JSON](https://raw.githubusercontent.com/${{ github.repository }}/main/data/latest.json)
            - [Versioned Data](https://github.com/${{ github.repository }}/tree/main/data/${{ steps.date.outputs.date }})

            **Update Date:** ${{ steps.date.outputs.date }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Workflow failed!"
          echo "Please check:"
          echo "1. Is your phone powered on and connected to WiFi?"
          echo "2. Is Tailscale running on your phone?"
          echo "3. Is the phone set as exit node in Tailscale?"
          echo "Check logs: https://github.com/${{ github.repository }}/actions"
