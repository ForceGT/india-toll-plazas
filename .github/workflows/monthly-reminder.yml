name: Monthly Reminder - Time to Update Data

on:
  schedule:
    - cron: '30 4 1 * *'  # 10:00 AM IST on the 1st of every month (4:30 UTC)

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Create reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '📅 Monthly Data Update Reminder - Time to Update Toll Plaza Data',
              body: 'Time to update the toll plaza dataset!\n\nSteps to follow:\n1. Run: bash ./fetch-and-process.sh\n2. Wait for completion (~3-4 minutes)\n3. Run: git push origin main\n\nGitHub Actions will automatically create a release with the updated data.\n\nNote: Data must be fetched locally due to NHAI API IP blocking of cloud runners. See README.md for details.'
            });
